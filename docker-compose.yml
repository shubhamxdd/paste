services:
  mongodb:
    image: mongo:7
    container_name: pastebin-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    expose:
      - "27017"

  server:
    build: ./server
    container_name: pastebin-server
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: pastebin
      PORT: 3000
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      POSTHOG_HOST: ${POSTHOG_HOST}
      PASTE_DELETE_CODE: ${PASTE_DELETE_CODE}
    expose:
      - "3000"
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      args:
        VITE_POSTHOG_API_KEY: ${VITE_POSTHOG_API_KEY}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST}
    container_name: pastebin-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server

  caddy:
    image: caddy:2-alpine
    container_name: pastebin-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
