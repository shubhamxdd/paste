services:
  mongodb:
    image: mongo:7
    container_name: pastebin-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    expose:
      - "27017"

  server:
    build: ./server
    container_name: pastebin-server
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: pastebin
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - mongodb

  client:
    build: ./client
    container_name: pastebin-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server

  caddy:
    image: caddy:2-alpine
    container_name: pastebin-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
